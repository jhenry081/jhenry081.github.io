<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Slab:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Bootstrap 4 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

  <!-- Academicons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />

  {% seo %}
</head>
<body>

  <!-- Progress bar -->
  <progress id="progress" value="0" max="100"></progress>

  <!-- Navbar -->
  <nav class="navbar navbar-light navbar-expand-sm fixed-top">
    <div class="container">
      <a class="navbar-brand title font-weight-lighter" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <button class="navbar-toggler collapsed" type="button" data-toggle="collapse" data-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar top-bar"></span>
        <span class="icon-bar middle-bar"></span>
        <span class="icon-bar bottom-bar"></span>
      </button>
      <div class="collapse navbar-collapse text-right" id="navbarNav">
        <ul class="navbar-nav ml-auto flex-nowrap">
          {% if page.url == "/" %}
            <li class="nav-item active"><a class="nav-link" href="#about">about</a></li>
            <li class="nav-item"><a class="nav-link" href="#projects">projects</a></li>
            <li class="nav-item"><a class="nav-link" href="#skills">skills</a></li>
            <li class="nav-item"><a class="nav-link" href="#blog">blog</a></li>
            <li class="nav-item"><a class="nav-link" href="#contact">contact</a></li>
          {% else %}
            <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}#about">about</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}#projects">projects</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}#skills">skills</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}#blog">blog</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}#contact">contact</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  {{ content }}

  <!-- Footer -->
  <footer class="footer mt-auto py-3">
    <div class="container text-center">
      <span class="text-muted">&copy; {{ 'now' | date: "%Y" }} {{ site.title }}.</span>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
      const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const progress = (scrollTop / scrollHeight) * 100;
      document.getElementById('progress').value = progress;
    });
  </script>

</body>
</html>
